name: Git Push Test
description: Tests git push in monitor mode (reproduces credential issue)
prompt: |
  Run these commands and report the output:
  1. git checkout -b test-branch-123
  2. echo test > test-file.txt
  3. git add test-file.txt
  4. git commit -m "Test commit"
  5. git push origin HEAD
  Report the exact error from git push.

repos:
  - name: alcove-testing
    url: https://github.com/bmbouter/alcove-testing.git

timeout: 120
enforcement_mode: monitor
