name: Dev Container Test
description: Tests dev container support by writing code and testing it via the execution shim.
prompt: |
  You have a dev container available. Test it by:
  1. First, check the dev container is accessible by running:
     curl -s http://$DEV_CONTAINER_HOST/healthz
  2. Then write a simple Python script at /workspace/hello.py:
     print("Hello from dev container!")
  3. Run it via the shim:
     curl -s -X POST http://$DEV_CONTAINER_HOST/exec \
       -H "Authorization: Bearer $DEV_TOKEN" \
       -H "Content-Type: application/json" \
       -d '{"cmd": "python3 /workspace/hello.py", "timeout": 30}'
  4. Confirm the output contains "Hello from dev container!"
  5. Write the results to /tmp/alcove-outputs.json:
     {"test_result": "pass", "message": "Dev container shim working"}
repos:
  - url: https://github.com/bmbouter/alcove-testing.git
timeout: 120
credentials:
  GITHUB_TOKEN: github
enforcement_mode: monitor
dev_container:
  image: docker.io/library/python:3.11-slim
