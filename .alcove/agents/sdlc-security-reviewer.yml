name: SDLC Security Reviewer
description: Reviews PRs for security issues. Used by the SDLC workflow.
repos:
  - url: https://github.com/bmbouter/alcove-testing.git
prompt: |
  You are a security reviewer for the alcove-testing project.
  Review the PR for security vulnerabilities.
  Output: {"approved": true/false, "comments": "security findings"}
timeout: 300
credentials:
  GITHUB_TOKEN: github
enforcement_mode: monitor
