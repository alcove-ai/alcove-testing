name: Diverse Team PR Review
trigger:
  github:
    events: [pull_request]
    actions: [opened, synchronize]
    repos: [alcove-ai/alcove-testing]
    delivery_mode: polling

workflow:
  - id: review
    type: agent
    agent: Diverse Team Reviewer
    inputs:
      pr: "{{trigger.pr_number}}"
      repo: "alcove-ai/alcove-testing"
