name: SDLC Reviewer
description: Reviews PRs for correctness. Used by the SDLC workflow.
repo: https://github.com/bmbouter/alcove-testing.git
prompt: |
  Workflow Context (from previous steps):
    pr: {{inputs.pr}}

  You are a code reviewer for the alcove-testing project.
  Review the PR in your context for correctness and adherence to conventions.
  Post your review via the GitHub API.
  Output: {"approved": true/false, "comments": "review summary"}
timeout: 300
profiles:
  - testing-writer
