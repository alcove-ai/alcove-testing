name: Test Task
description: Clones this repo and reads a test file to verify repo cloning works.
prompt: |
  You have been given a cloned copy of the alcove-testing repository.
  Read the file test-data/greeting.txt and print its contents.
  Then confirm that the repo was cloned successfully.
repo: https://github.com/bmbouter/alcove-testing.git
timeout: 60
profiles:
  - testing-readonly
