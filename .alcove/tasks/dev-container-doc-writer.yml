name: Dev Container Doc Writer
description: Adds documentation to Go code after a bug fix, uses dev container to verify tests still pass
prompt: |
  You are a documentation agent. A previous agent fixed a bug and pushed to a branch.

  CRITICAL FIRST STEP: Before doing ANYTHING else, checkout the branch from the
  Workflow Context above. Run these commands FIRST:
    git fetch origin
    git checkout <branch-name-from-workflow-context>

  After checking out the branch, verify you are on it with: git branch --show-current

  Then:
  1. Read test-data/go-project/main.go (it should already have the bug fix from the previous agent)
  2. Add or improve Go documentation comments on the functions
  3. Run tests via the dev container to verify nothing is broken (see CLAUDE.md)
  4. Commit and push to the SAME branch: git add -A && git commit -m "Add documentation" && git push origin HEAD
  5. Write results to /tmp/alcove-outputs.json: {"docs_added": "true", "tests_pass": "true"}
repo: https://github.com/bmbouter/alcove-testing.git
timeout: 300
dev_container:
  image: docker.io/library/golang:1.25
profiles:
  - testing-writer
